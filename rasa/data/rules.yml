version: "3.1"

rules:

- rule: Despedir siempre
  steps:
  - intent: despedir
  - action: utter_despedir

- rule: Responder si es bot
  steps:
  - intent: bot_challenge
  - action: utter_soy_bot

- rule: Manejar chit-chat con advertencia
  steps:
  - intent: chit_chat
  - action: action_manejar_conducta

- rule: Manejar insulto
  steps:
  - intent: insultar
  - action: action_manejar_conducta

- rule: Agradecer
  steps:
  - intent: agradecer
  - action: utter_agradecer

- rule: Fallback por no-input o mensaje no reconocido
  steps:
  - intent: nlu_fallback
  - action: utter_no_entiendo

- rule: Consultar otro pokemon con contexto
  steps:
  - intent: consultar_otro_pokemon
  - action: action_consultar_otro_pokemon

- rule: Consultar generacion
  steps:
  - intent: consultar_generacion
  - action: action_consultar_generacion

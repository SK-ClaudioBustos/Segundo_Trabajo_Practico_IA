version: "3.1"

rules:

# - rule: Forzar saludo al inicio
#   conversation_start: true
#   steps:
#   - action: action_session_start
  
# - rule: Saludo inicial
#   steps:
#   - intent: saludar  
#   - action: utter_saludar

- rule: Saludo inicial
  conversation_start: true
  steps:
  - intent: saludar
  - action: utter_bienvenida

- rule: Saludos siguientes
  conversation_start: false
  steps:
  - intent: saludar
  - action: utter_saludar

- rule: Despedir siempre
  steps:
  - intent: despedir
  - action: utter_despedir

- rule: Responder si es bot (fuera de tema)
  steps:
  - intent: bot_challenge
  - action: action_manejar_conducta

- rule: Manejar chit-chat con advertencia
  steps:
  - intent: chit_chat
  - action: action_manejar_conducta

- rule: Manejar insulto
  steps:
  - intent: insultar
  - action: action_manejar_conducta

- rule: Agradecer
  steps:
  - intent: agradecer
  - action: utter_agradecer

- rule: Fallback por mensaje no reconocido (fuera de tema)
  steps:
  - intent: nlu_fallback
  - action: action_manejar_conducta

- rule: Consultar tipo especifico de pokemon
  steps:
  - intent: consultar_tipo_pokemon
  - action: action_consultar_tipo_pokemon

- rule: Consultar ID de pokemon
  steps:
  - intent: consultar_id_pokemon
  - action: action_consultar_id_pokemon

- rule: Consultar generacion de un pokemon especifico
  steps:
  - intent: consultar_generacion_pokemon
  - action: action_consultar_generacion_pokemon

- rule: Consultar dato curioso de pokemon
  steps:
  - intent: consultar_dato_curioso
  - action: action_consultar_dato_curioso

- rule: Consultar cantidad de pokemon por generacion
  steps:
  - intent: consultar_cantidad_generacion
  - action: action_consultar_cantidad_generacion

- rule: Consultar generacion
  steps:
  - intent: consultar_generacion
  - action: action_consultar_generacion

- rule: Consultar otro pokemon con contexto
  steps:
  - intent: consultar_otro_pokemon
  - action: action_consultar_otro_pokemon
